<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 | Not Found</title>

<style>

* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Courier New", monospace;
}

body {

    min-height:100vh;
    background:#050505;
    color:white;
    overflow-x:hidden;

}


/* background */

.bg {

    position:fixed;
    inset:0;

    background:
    linear-gradient(
        rgba(255,255,255,.03) 1px,
        transparent 1px
    ),
    linear-gradient(
        90deg,
        rgba(255,255,255,.03) 1px,
        transparent 1px
    );

    background-size:45px 45px;

    animation:gridMove 12s linear infinite;

}


@keyframes gridMove {

from {
    background-position:0 0;
}

to {
    background-position:45px 45px;
}

}



.glow {

    position:fixed;
    width:600px;
    height:600px;

    background:
    radial-gradient(
    circle,
    rgba(120,80,255,.25),
    transparent 65%
    );

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    animation:pulseGlow 5s infinite;

}


@keyframes pulseGlow {

50% {
    opacity:.5;
    scale:1.15;
}

}



/* scan lines */

body:after {

content:"";

position:fixed;
inset:0;

background:
repeating-linear-gradient(
transparent,
transparent 3px,
rgba(255,255,255,.02) 4px
);

pointer-events:none;

}



/* Main */

.container {

height:100vh;

display:flex;
align-items:center;
justify-content:center;

padding:30px;

}



.box {

position:relative;

width:650px;

text-align:center;

padding:50px;

background:
rgba(0,0,0,.65);

border:

1px solid rgba(255,255,255,.12);


border-radius:20px;


backdrop-filter:blur(10px);


box-shadow:

0 0 60px rgba(120,80,255,.15);


animation:float 5s ease-in-out infinite;

}



@keyframes float {

50% {

transform:translateY(-15px);

}

}




/* Logo */

.logo {

width:150px;

height:150px;

object-fit:contain;

margin-bottom:30px;


filter:

drop-shadow(0 0 20px #8b5cff);


animation:

logoFloat 4s infinite;

}


@keyframes logoFloat {

50% {

transform:translateY(-10px) rotate(2deg);

}

}




/* Error */


.error {

font-size:110px;

font-weight:bold;


letter-spacing:10px;


color:#8b5cff;


text-shadow:

0 0 10px #8b5cff,

0 0 35px #8b5cff;


animation:errorGlitch 3s infinite;

}



@keyframes errorGlitch {


0%,90%,100% {

transform:none;

}


92% {

transform:translateX(5px);

}


94% {

transform:translateX(-5px);

}


}




h1 {

font-size:34px;

margin-bottom:15px;

}



p {

color:#a7a7a7;

font-size:16px;

line-height:1.7;

}



.status {

margin-top:35px;

font-size:13px;

color:#777;

letter-spacing:3px;

}



.status span {

color:#00c8ff;

animation:blink 1.5s infinite;

}



@keyframes blink {

50% {

opacity:.2;

}

}




/* floating dots */


.dot {

position:fixed;

width:5px;

height:5px;

background:#8b5cff;

border-radius:50%;

opacity:.7;

animation:up 12s linear infinite;

}



@keyframes up {

from {

transform:translateY(100vh);

}


to {

transform:translateY(-20vh);

}

}



</style>

</head>


<body>


<div class="bg"></div>

<div class="glow"></div>


<div class="dot" style="left:15%;animation-delay:0s"></div>
<div class="dot" style="left:40%;animation-delay:3s"></div>
<div class="dot" style="left:70%;animation-delay:6s"></div>
<div class="dot" style="left:90%;animation-delay:2s"></div>



<div class="container">


<div class="box">


<img class="logo"

src="https://cdn.discordapp.com/attachments/1526687497483059400/1526800300357451786/Untitled246_20260715005906.png?ex=6a58ffd6&is=6a57ae56&hm=8ba441945c8a9cebd95c79264908537dc5976406b205566abef91ced837c2134">


<div class="error">

404

</div>


<h1>

PAGE NOT FOUND

</h1>


<p>

The requested location could not be found.<br>
The page may have been removed, renamed, or never existed or it is down.

</p>


<div class="status">

SYSTEM STATUS:
<span>Being Maintained</span>

</div>


</div>


</div>


</body>
</html>
