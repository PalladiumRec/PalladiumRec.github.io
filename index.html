<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloads | Coming Soon</title>
    <style>
        :root {
            --bg-color: #050508; /* Deep true black */
            --card-bg: rgba(15, 12, 22, 0.75); /* Dark black-purple tint */
            --text-main: #ffffff;
            --text-muted: #a78bfa; /* Soft violet/purple */
            --accent-purple: #8b5cf6; /* Vibrant purple */
            --accent-glow: rgba(139, 92, 246, 0.25); /* Purple aura glow */
            --btn-bg: rgba(139, 92, 246, 0.1);
            --btn-border: rgba(139, 92, 246, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- FULL SCREEN LOADING SCREEN --- */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        /* Linear purple progress bar container */
        .loader-container {
            width: 240px;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 1rem;
            position: relative;
        }

        /* Moving loading line animation */
        .loader-bar {
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--accent-purple), transparent);
            position: absolute;
            left: -40%;
            animation: loading-slide 1.5s infinite ease-in-out;
            box-shadow: 0 0 10px var(--accent-purple);
        }

        @keyframes loading-slide {
            0% { left: -40%; }
            100% { left: 100%; }
        }

        .loading-text {
            color: var(--text-muted);
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 500;
            opacity: 0.8;
        }

        /* Class to fade out and slide away the loader */
        .fade-out {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.02);
        }


        /* --- MAIN PAGE CONTENT --- */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: radial-gradient(circle at 50% 50%, #0f0c1b 0%, #050508 100%);
            z-index: 1;
        }

        .stars::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            right: -50%;
            bottom: -50%;
            width: 200%;
            height: 200%;
            background: transparent url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=80&w=3000') repeat;
            background-size: 600px 600px;
            opacity: 0.08;
            filter: hue-rotate(45deg);
            animation: pan 180s linear infinite;
        }

        @keyframes pan {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .download-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 540px;
            padding: 3.5rem 2.5rem;
            margin: 1.5rem;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(139, 92, 246, 0.15);
            border-radius: 24px;
            text-align: center;
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.7),
                0 0 50px var(--accent-glow);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .download-card:hover {
            transform: translateY(-4px);
            box-shadow: 
                0 15px 50px rgba(0, 0, 0, 0.8),
                0 0 60px rgba(139, 92, 246, 0.35);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
            background: linear-gradient(to bottom, #ffffff, #e9d5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-weight: 400;
        }

        .btn-status {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 320px;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            color: #f3e8ff;
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            border-radius: 50px;
            text-decoration: none;
            cursor: not-allowed;
            letter-spacing: 0.02em;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .footer-note {
            font-size: 0.875rem;
            color: rgba(167, 139, 250, 0.5);
            margin-top: 2.5rem;
            font-weight: 400;
            letter-spacing: 0.01em;
        }
    </style>
</head>
<body>

    <!-- 1. Full Screen Loading Screen Overlay -->
    <div id="loading-screen">
        <div class="loader-container">
            <div class="loader-bar"></div>
        </div>
        <div class="loading-text">Loading Assets</div>
    </div>

    <!-- 2. Main Hidden / Back Area Layout -->
    <div class="stars"></div>

    <div class="download-card">
        <h1>Downloads</h1>
        <p class="subtitle">Welcome to our download page.</p>
        
        <div class="btn-status">
            No File Yet – Coming Soon
        </div>
        
        <p class="footer-note">Game is being worked on the file is coming soon...</p>
    </div>

    <!-- 3. Brief JavaScript snippet to auto-hide loading screen -->
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            // Simulated loading timing. Adjust '2000' (2 seconds) to whatever you prefer.
            setTimeout(() => {
                const loader = document.getElementById('loading-screen');
                loader.classList.add('fade-out');
            }, 2000); 
        });
    </script>
</body>
</html>
